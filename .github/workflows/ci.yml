# CI: checks + tests en cada push/PR (roadmap #28)
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  django-check:
    name: Django check y deploy
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-django-secret-key-minimum-fifty-characters-long-xx
      DEBUG: "true"
      ALLOWED_HOSTS: localhost,127.0.0.1
      SOCIAL_LOGIN_PROVIDERS: ""
      CELERY_TASK_ALWAYS_EAGER: "true"
      SYNC_HTTP_ASYNC: "true"
      FULL_SYNC_HTTP_ENABLED: "false"
      PANACCESS_SESSION_USE_REDIS: "false"
      url_panaccess: https://ci.invalid/panaccess
      username: ci_user
      password: ci_pass
      api_token: ci_token
      salt: ci_salt
      hcId: ci_hc
      ENCRYPTION_KEY: ci-encryption-key-32bytes-base64url==

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django check
        run: python manage.py check

      - name: check_deploy (modo dev)
        run: python manage.py check_deploy

  test:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-django-secret-key-minimum-fifty-characters-long-xx
      DEBUG: "true"
      ALLOWED_HOSTS: localhost,127.0.0.1
      SOCIAL_LOGIN_PROVIDERS: ""
      CELERY_TASK_ALWAYS_EAGER: "true"
      url_panaccess: https://ci.invalid/panaccess
      username: ci_user
      password: ci_pass
      api_token: ci_token
      salt: ci_salt
      hcId: ci_hc
      ENCRYPTION_KEY: ci-encryption-key-32bytes-base64url==

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Migraciones
        run: python manage.py migrate --noinput

      - name: Tests
        run: python manage.py test wind.tests --verbosity=2

  redis-check:
    name: check_redis (opcional)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-django-secret-key-minimum-fifty-characters-long-xx
      DEBUG: "true"
      ALLOWED_HOSTS: localhost
      SOCIAL_LOGIN_PROVIDERS: ""
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"
      CELERY_TASK_ALWAYS_EAGER: "true"
      url_panaccess: https://ci.invalid/panaccess
      username: ci_user
      password: ci_pass
      api_token: ci_token
      salt: ci_salt
      hcId: ci_hc
      ENCRYPTION_KEY: ci-encryption-key-32bytes-base64url==

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: check_redis
        run: python manage.py check_redis
