# Plantilla nginx — Ubuntu Server (roadmap #5)
# 1. Sustituye api.miempresa.com y rutas de certificado
# 2. Ajusta "allow" con la IP de tu VPN/oficina para sync
# 3. sudo ln -s .../win-backend.conf /etc/nginx/sites-enabled/
# 4. sudo nginx -t && sudo systemctl reload nginx

upstream win_gunicorn {
    server 127.0.0.1:8000 fail_timeout=0;
}

# Redirección HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.miempresa.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.miempresa.com;

    ssl_certificate     /etc/letsencrypt/live/api.miempresa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.miempresa.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    # --- Rutas operativas: solo red de confianza (VPN / localhost) ---
    location ~ ^/wind/(sync-|compare-and-update|full-sync|singleton|login/) {
        allow 127.0.0.1;
        # allow 10.8.0.0/24;   # VPN ejemplo
        deny all;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://win_gunicorn;
    }

    location ~ ^/api/v1/tasks/ {
        allow 127.0.0.1;
        # allow 10.8.0.0/24;
        deny all;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://win_gunicorn;
    }

    # --- API pública (perfil, auth, portal) ---
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_pass http://win_gunicorn;
    }

    location /static/ {
        alias /opt/win-backend/staticfiles/;
    }
}
